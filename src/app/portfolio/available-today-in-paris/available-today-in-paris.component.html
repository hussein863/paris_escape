<section class="available-today">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">Available Today in Paris</h2>
      <button class="see-all-btn" (click)="onSeeAllForToday()">
        See all for today
      </button>
    </div>

    <div class="experiences-grid">
      <app-mini-card 
        *ngFor="let experience of todayExperiences" 
        [experience]="experience">
      </app-mini-card>
    </div>
  </div>
</section>
