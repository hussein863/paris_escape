<app-admin-header></app-admin-header>

<div class="app-shell" [class.sidebar-open]="isSidebarOpen">
  <button type="button" class="hamburger" (click)="toggleSidebar()" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <app-sidebar class="sidebar" [class.open]="isSidebarOpen"></app-sidebar>
  <div class="backdrop" *ngIf="isSidebarOpen" (click)="closeSidebar()" aria-label="Close menu"></div>

  <main class="app-main">
    <section class="create-experience-page">
      <!-- Header -->
      <header class="page-header">
        <div class="header-info">
          <h1>{{currentStepData.title}}</h1>
          <p class="step-info">Step {{currentStep}} of {{totalSteps}} • {{currentStepData.description}}</p>
        </div>
        <div class="header-actions">
          <button class="btn-secondary" *ngIf="currentStep > 1" (click)="goBack()">
            <i class="fa-solid fa-arrow-left"></i>
            Back
          </button>
          <button class="btn-secondary" (click)="saveDraft()" [disabled]="saving">
            <i class="fa-regular fa-floppy-disk"></i>
            {{ saving ? 'Saving...' : 'Save Draft' }}
          </button>
          <button class="btn-primary" *ngIf="currentStep < totalSteps" (click)="nextStep()" [disabled]="saving">
            {{ saving ? 'Saving...' : 'Continue' }}
            <i class="fa-solid fa-arrow-right" *ngIf="!saving"></i>
            <i class="fa-solid fa-spinner fa-spin" *ngIf="saving"></i>
          </button>
          <button class="btn-primary" *ngIf="currentStep === totalSteps" (click)="publish()" [disabled]="saving">
            <i class="fa-solid fa-rocket" *ngIf="!saving"></i>
            <i class="fa-solid fa-spinner fa-spin" *ngIf="saving"></i>
            {{ saving ? 'Publishing...' : 'Publish' }}
          </button>
        </div>
      </header>

      <!-- Stepper -->
      <div class="stepper">
        <div
          class="step"
          *ngFor="let step of steps"
          [class.active]="step.number === currentStep"
          [class.completed]="step.completed"
        >
          <div class="step-circle">
            <i class="fa-solid fa-check" *ngIf="step.completed"></i>
            <span *ngIf="!step.completed">{{step.number}}</span>
          </div>
          <div class="step-line" *ngIf="step.number < totalSteps"></div>
        </div>
      </div>

      <!-- Step Content -->
      <div class="step-content">
        <div class="step-panel" [hidden]="currentStep !== 1"><app-step-basics></app-step-basics></div>
        <div class="step-panel" [hidden]="currentStep !== 2"><app-step-media [prefillData]="pendingPrefill"></app-step-media></div>
        <div class="step-panel" [hidden]="currentStep !== 3"><app-step-pricing></app-step-pricing></div>
        <div class="step-panel" [hidden]="currentStep !== 4"><app-step-options></app-step-options></div>
        <div class="step-panel" [hidden]="currentStep !== 5"><app-step-availability></app-step-availability></div>
        <div class="step-panel" [hidden]="currentStep !== 6"><app-step-inclusions></app-step-inclusions></div>
        <div class="step-panel" [hidden]="currentStep !== 7"><app-step-policies></app-step-policies></div>
        <div class="step-panel" [hidden]="currentStep !== 8"><app-step-preview [experienceId]="experienceId"></app-step-preview></div>
      </div>
    </section>
  </main>
</div>

<!-- Toast -->
<div class="toast-container" *ngIf="toast" [class]="'toast toast-' + toast.type">
  <i class="fas" [class.fa-check-circle]="toast.type === 'success'" [class.fa-times-circle]="toast.type === 'error'"></i>
  <span>{{ toast.message }}</span>
  <button type="button" class="toast-close" (click)="toast = null"><i class="fas fa-times"></i></button>
</div>
