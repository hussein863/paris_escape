<header class="client-header">
  <div class="search-container">
    <i class="fas fa-search search-icon"></i>
    <input
      type="text"
      placeholder="Search experiences or guides..."
      class="search-input"
      [(ngModel)]="searchQuery"
      (keydown.enter)="search()"
    >
  </div>

  <div class="header-actions">

    <!-- Notification bell -->
    <div class="notif-btn-wrap">
      <button class="notification-btn" (click)="toggleNotifDropdown()" type="button">
        <i class="fas fa-bell"></i>
        <span class="notification-badge" *ngIf="totalUnread > 0">
          {{ totalUnread > 9 ? '9+' : totalUnread }}
        </span>
      </button>

      <!-- Notification dropdown -->
      <div class="notif-dropdown" *ngIf="notifDropdownOpen" (click)="$event.stopPropagation()">
        <div class="notif-dropdown-header">
          <span>Notifications</span>
          <button type="button" class="notif-mark-all" (click)="notifications.markAllRead()" *ngIf="notifications.unreadCount() > 0">
            Mark all read
          </button>
        </div>

        <div class="notif-list">
          <ng-container *ngIf="notifications.notifications().length > 0; else emptyNotif">
            <div
              *ngFor="let n of notifications.notifications()"
              class="notif-item"
              [class.unread]="!n.read"
              (click)="onNotifClick(n)"
            >
              <div class="notif-icon-wrap">
                <i class="fas" [class]="notifIcon(n.type)"></i>
              </div>
              <div class="notif-body">
                <p class="notif-title">{{ n.title }}</p>
                <p class="notif-text" *ngIf="n.body">{{ n.body }}</p>
                <span class="notif-time">{{ n.created_at | date:'d MMM, HH:mm' }}</span>
              </div>
              <span class="notif-dot" *ngIf="!n.read"></span>
            </div>
          </ng-container>
          <ng-template #emptyNotif>
            <div class="notif-empty">
              <i class="fas fa-bell-slash"></i>
              <p>No notifications yet</p>
            </div>
          </ng-template>
        </div>
      </div>
    </div>

    <div class="user-profile" (click)="toggleDropdown()">
      <!-- Avatar: image if available, else initials -->
      <div class="avatar-wrapper">
        <img *ngIf="userAvatar" [src]="userAvatar" [alt]="userName" class="user-avatar">
        <div *ngIf="!userAvatar" class="user-initials">{{ initials }}</div>
      </div>

      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ userRole }}</span>
      </div>

      <i class="fas fa-chevron-down dropdown-arrow" [class.open]="dropdownOpen"></i>

      <!-- Dropdown -->
      <div class="profile-dropdown" *ngIf="dropdownOpen" (click)="$event.stopPropagation()">
        <div class="dropdown-header">
          <div *ngIf="!userAvatar" class="user-initials small">{{ initials }}</div>
          <img *ngIf="userAvatar" [src]="userAvatar" [alt]="userName" class="user-avatar small">
          <div>
            <div class="dropdown-name">{{ userName }}</div>
            <div class="dropdown-role">{{ userRole }}</div>
          </div>
        </div>
        <hr class="dropdown-divider">
        <button class="dropdown-item" routerLink="/client/home">
          <i class="fas fa-home"></i> Dashboard
        </button>
        <button class="dropdown-item" routerLink="/client/reservations">
          <i class="fas fa-calendar-check"></i> My Reservations
        </button>
        <button class="dropdown-item" routerLink="/client/messages">
          <i class="fas fa-message"></i> Messages
          <span class="msg-count-badge" *ngIf="unreadMessages > 0">
            {{ unreadMessages > 9 ? '9+' : unreadMessages }}
          </span>
        </button>
        <button class="dropdown-item" (click)="goToSettings()">
          <i class="fas fa-gear"></i> Settings
        </button>
        <hr class="dropdown-divider">
        <button class="dropdown-item logout" (click)="logout()">
          <i class="fas fa-right-from-bracket"></i> Log out
        </button>
      </div>
    </div>
  </div>
</header>
