<section class="reviews-section">
  <div class="reviews-header">
    <h2 class="section-title">Reviews</h2>
    <div class="header-right">
      <div class="rating-summary">
        <i class="fas fa-star"></i>
        <span class="rating-value">{{ averageRating }}</span>
        <span class="rating-count">({{ totalReviews }} reviews)</span>
      </div>
      <button
        class="write-review-btn"
        [disabled]="!canReview"
        [title]="!isLoggedIn ? 'Sign in to write a review' : !canReview ? 'Complete this experience first' : ''"
        (click)="writeReviewClicked.emit()">
        Write a Review
      </button>
    </div>
  </div>

  <p class="review-eligibility" *ngIf="isLoggedIn && !canReview">
    <i class="fas fa-info-circle"></i>
    You can write a review after completing this experience.
  </p>

  <div class="filters">
    <button
      *ngFor="let filter of filters"
      class="filter-btn"
      [class.active]="activeFilter === filter.toLowerCase()"
      (click)="setFilter(filter)">
      {{ filter }}
    </button>
  </div>

  <div class="reviews-list">
    <div class="review-card" *ngFor="let review of reviews">
      <div class="review-layout">
        <img [src]="review.avatar || 'assets/images/avatar-placeholder.png'" [alt]="review.author" class="reviewer-avatar" />

        <div class="review-content-wrapper">
          <div class="review-header">
            <div class="reviewer-info">
              <span class="reviewer-name">{{ review.author }}</span>
              <div class="reviewer-rating">
                <i class="fas fa-star" *ngFor="let star of getStars(review.rating)"></i>
              </div>
            </div>
            <span class="review-date">{{ review.date }}</span>
          </div>
          <p class="review-content">{{ review.comment }}</p>

          <div class="guide-reply" *ngIf="review.reply">
            <div class="reply-header">
              <i class="fas fa-reply"></i>
              <span>Guide's response</span>
              <span class="reply-date">{{ review.reply.date | date:'MMM yyyy' }}</span>
            </div>
            <p class="reply-content">{{ review.reply.content }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button class="load-more-btn" (click)="loadMore()">
    Load more reviews
  </button>

  <div class="report-link">
    <button class="report-btn" (click)="reportClicked.emit()">
      <i class="fas fa-flag"></i>
      Report this experience
    </button>
  </div>
</section>
