<div class="location-media-wrapper">
  <!-- Location & Service Area -->
  <div class="section-card">
    <h2 class="section-title">Location & Service Area</h2>

    <div class="form-group">
      <label for="baseCity">Base City</label>
      <input
        type="text"
        id="baseCity"
        class="form-control"
        placeholder="Paris"
        [(ngModel)]="baseCity"
      />
    </div>

    <div class="form-group">
      <label for="neighborhood">Neighborhood</label>
      <input
        type="text"
        id="neighborhood"
        class="form-control"
        placeholder="Montmartre"
        [(ngModel)]="neighborhood"
      />
    </div>

    <div class="form-group">
      <label>Home Area Pin</label>
      <div class="map-placeholder">
        <i class="fas fa-map-marker-alt"></i>
      </div>
      <button class="btn-link" type="button" (click)="updateLocation()">
        <i class="fas fa-edit"></i>
        Update Location
      </button>
    </div>

    <div class="form-group">
      <label>Meeting Points Library</label>
      <div class="meeting-points-list">
        <div class="meeting-point" *ngFor="let point of meetingPoints; let i = index">
          <div class="meeting-point-content">
            <div class="meeting-point-header">
              <strong>{{ point.name || 'New Meeting Point' }}</strong>
              <span class="badge-default" *ngIf="point.isDefault">Default</span>
            </div>
            <p class="meeting-point-address">{{ point.address }}</p>
            <div class="meeting-point-actions">
              <button class="btn-text" type="button">
                Edit
              </button>
              <button class="btn-text" type="button" (click)="setDefaultMeetingPoint(i)" *ngIf="!point.isDefault">
                Set Default
              </button>
              <button class="btn-text" type="button" (click)="removeMeetingPoint(i)">
                Remove
              </button>
            </div>
          </div>
        </div>
      </div>
      <button class="btn-add-large" type="button" (click)="addMeetingPoint()">
        <i class="fas fa-plus"></i>
        Add Meeting Point
      </button>
    </div>
  </div>

  <!-- Media Section -->
  <div class="section-card">
    <h2 class="section-title">Media</h2>

    <div class="form-group">
      <label>Cover Image</label>
      <div class="cover-image">
        <img [src]="coverImage" alt="Cover" />
      </div>
      <button class="btn-upload" type="button" (click)="uploadCover()">
        <i class="fas fa-upload"></i>
        Upload New Cover
      </button>
    </div>

    <div class="form-group">
      <label>Photo Gallery</label>
      <div class="photo-gallery">
        <div class="gallery-item" *ngFor="let photo of photoGallery; let i = index">
          <img [src]="photo" alt="Gallery photo" />
          <button class="gallery-remove" type="button" (click)="removePhoto(i)">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
      <button class="btn-upload" type="button" (click)="addPhotos()">
        <i class="fas fa-plus"></i>
        Add Photos
      </button>
    </div>

    <div class="form-group">
      <label>Video Teaser (30-60s)</label>
      <div class="video-placeholder">
        <i class="fas fa-video"></i>
      </div>
      <button class="btn-upload" type="button" (click)="uploadVideo()">
        <i class="fas fa-upload"></i>
        Upload Video
      </button>
    </div>
        <hr class="separator" style="color: f3f4f6; opacity: 0.2;margin-top: -9px;
    margin-bottom: 16px;">
    <button class="btn-qr" type="button" (click)="downloadQRCode()">
      <i class="fas fa-qrcode"></i>
      Download QR Code
    </button>
  </div>
</div>
