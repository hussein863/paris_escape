<section class="how-it-works">
  <div class="container">
    <h2 class="section-title">How it works</h2>
    
    <div class="steps-grid">
      <div class="step-card" *ngFor="let step of steps">
        <div class="icon-wrapper">
          <svg class="step-icon" [attr.width]="step.iconSize" [attr.height]="step.iconSize" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ng-container [ngSwitch]="step.id">
              <!-- Search Icon -->
              <g *ngSwitchCase="1">
                <circle cx="11" cy="11" r="8" stroke="white" stroke-width="2"/>
                <path d="M21 21L16.65 16.65" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </g>
              
              <!-- Book Icon -->
              <g *ngSwitchCase="2">
                <rect x="3" y="4" width="18" height="18" rx="2" stroke="white" stroke-width="2"/>
                <path d="M16 2V6M8 2V6M3 10H21" stroke="white" stroke-width="2" stroke-linecap="round"/>
              </g>
              
              <!-- Explore Icon -->
              <g *ngSwitchCase="3">
                <path d="M21 10C21 17 12 23 12 23C12 23 3 17 3 10C3 5.58172 6.58172 2 11 2C13.5 2 15.5 3.5 16.5 5.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="10" r="3" stroke="white" stroke-width="2"/>
              </g>
            </ng-container>
          </svg>
        </div>
        
        <h3 class="step-title">{{ step.title }}</h3>
        <p class="step-description">{{ step.description }}</p>
      </div>
    </div>
  </div>
</section>
