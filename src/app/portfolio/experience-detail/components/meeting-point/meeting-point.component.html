<section class="meeting-point-section">
  <h2 class="section-title">Meeting point</h2>

  <div class="map-container">
    <iframe
      [src]="mapsEmbedUrl"
      class="map-iframe"
      allowfullscreen
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>

  <div class="meeting-info">
    <div class="location-icon">
      <i class="fas fa-map-marker-alt"></i>
    </div>
    <div class="location-details">
      <h3 class="location-name">{{ meetingPoint.name }}</h3>
      <p class="location-address">{{ meetingPoint.address }}</p>
      <p class="location-instructions">{{ meetingPoint.instructions }}</p>
    </div>
  </div>

  <div class="meeting-actions">
    <button class="btn btn-maps" (click)="openMaps()">
      <i class="fa-solid fa-map-location-dot"></i>
      Open in Maps
    </button>
    <span class="metro-info">
      {{ meetingPoint.metro }}
    </span>
  </div>
</section>
