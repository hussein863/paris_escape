<header class="admin-header" style="background: white; height: 70px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 2rem; gap: 1.5rem;">
  <img src="assets/images/logo.svg" alt="Paris Escape" class="header-logo" />
  <div style="flex: 1;"></div>
  <div style="display: flex; align-items: center; gap: 1.5rem;">

    <!-- Notification bell -->
    <div class="notif-btn-wrap">
      <button class="notif-bell-btn" type="button" (click)="toggleNotifDropdown()">
        <i class="fas fa-bell"></i>
        <span class="notif-count" *ngIf="totalUnread > 0">
          {{ totalUnread > 9 ? '9+' : totalUnread }}
        </span>
      </button>

      <!-- Notification dropdown -->
      <div class="notif-dropdown" *ngIf="notifDropdownOpen" (click)="$event.stopPropagation()">
        <div class="notif-dropdown-header">
          <span>Notifications</span>
          <button type="button" class="notif-mark-all" (click)="notifications.markAllRead()" *ngIf="notifications.unreadCount() > 0">
            Mark all read
          </button>
        </div>
        <div class="notif-list">
          <ng-container *ngIf="notifications.notifications().length > 0; else emptyNotif">
            <div
              *ngFor="let n of notifications.notifications()"
              class="notif-item"
              [class.unread]="!n.read"
              (click)="onNotifClick(n)"
            >
              <div class="notif-icon-wrap">
                <i class="fas" [class]="notifIcon(n.type)"></i>
              </div>
              <div class="notif-body">
                <p class="notif-title">{{ n.title }}</p>
                <p class="notif-text" *ngIf="n.body">{{ n.body }}</p>
                <span class="notif-time">{{ n.created_at | date:'d MMM, HH:mm' }}</span>
              </div>
              <span class="notif-dot" *ngIf="!n.read"></span>
            </div>
          </ng-container>
          <ng-template #emptyNotif>
            <div class="notif-empty">
              <i class="fas fa-bell-slash"></i>
              <p>No notifications yet</p>
            </div>
          </ng-template>
        </div>
      </div>
    </div>

    <div class="user-profile" (click)="toggleDropdown()">
      <div class="avatar-wrapper">
        <img *ngIf="userAvatar" [src]="userAvatar" [alt]="userName" class="user-avatar">
        <div *ngIf="!userAvatar" class="user-initials">{{ initials }}</div>
      </div>

      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
      </div>

      <i class="fas fa-chevron-down dropdown-arrow" [class.open]="dropdownOpen"></i>

      <!-- Dropdown -->
      <div class="profile-dropdown" *ngIf="dropdownOpen" (click)="$event.stopPropagation()">
        <div class="dropdown-header">
          <div *ngIf="!userAvatar" class="user-initials small">{{ initials }}</div>
          <img *ngIf="userAvatar" [src]="userAvatar" [alt]="userName" class="user-avatar small">
          <div>
            <div class="dropdown-name">{{ userName }}</div>
            <div class="dropdown-role">Guide</div>
          </div>
        </div>
        <hr class="dropdown-divider">
        <button class="dropdown-item" (click)="goToProfile()">
          <i class="fas fa-user"></i> My Profile
        </button>
        <button class="dropdown-item" routerLink="/admin/settings">
          <i class="fas fa-gear"></i> Settings
        </button>
        <hr class="dropdown-divider">
        <button class="dropdown-item logout" (click)="logout()">
          <i class="fas fa-right-from-bracket"></i> Log out
        </button>
      </div>
    </div>
  </div>
</header>
