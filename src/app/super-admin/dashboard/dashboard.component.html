<div class="sa-page">
  <div class="page-header">
    <h1>Dashboard</h1>
    <p class="page-sub">Platform overview — live data</p>
  </div>

  <!-- Loading state -->
  <div class="loading-state" *ngIf="loading">
    <i class="fas fa-circle-notch fa-spin"></i> Loading stats…
  </div>

  <ng-container *ngIf="!loading && stats">

    <!-- KPI Cards -->
    <div class="stats-row">
      <div class="stat-card" *ngFor="let kpi of kpis" [style.border-top-color]="kpi.color">
        <div class="stat-icon" [style.color]="kpi.color">
          <i class="fas fa-{{ kpi.icon }}"></i>
        </div>
        <div class="stat-body">
          <div class="stat-value">{{ kpi.value }}</div>
          <div class="stat-label">{{ kpi.title }}</div>
          <div class="stat-sub">{{ kpi.sub }}</div>
        </div>
      </div>
    </div>

    <!-- Pending Actions -->
    <div class="section-block" *ngIf="pendingActions.length > 0">
      <h2 class="section-title">Pending Actions</h2>
      <div class="pending-list">
        <a
          class="pending-item"
          *ngFor="let a of pendingActions"
          [routerLink]="a.route"
          [class.urgent]="a.urgent">
          <span class="pending-dot" [class.urgent]="a.urgent"></span>
          <span class="pending-label">{{ a.label }}</span>
          <span class="pending-count">{{ a.count }}</span>
          <i class="fas fa-chevron-right pending-arrow"></i>
        </a>
      </div>
    </div>

    <div class="section-block all-clear" *ngIf="pendingActions.length === 0">
      <i class="fas fa-check-circle"></i>
      <span>No pending actions — everything is up to date.</span>
    </div>

    <!-- Quick Links -->
    <div class="section-block">
      <h2 class="section-title">Quick Links</h2>
      <div class="quick-grid">
        <a class="quick-card" *ngFor="let q of quickLinks" [routerLink]="q.route">
          <i class="fas fa-{{ q.icon }}"></i>
          <span>{{ q.label }}</span>
        </a>
      </div>
    </div>

  </ng-container>

  <!-- Error state -->
  <div class="empty-state" *ngIf="!loading && !stats">
    <i class="fas fa-exclamation-triangle"></i>
    <p>Could not load dashboard data. Make sure the backend is running.</p>
  </div>
</div>
