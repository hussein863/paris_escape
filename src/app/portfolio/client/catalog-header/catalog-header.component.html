<div class="catalog-header">
  <div class="container">
    <nav class="breadcrumb">
      <a href="/" class="breadcrumb-link">Home</a>
      <i class="fas fa-chevron-right breadcrumb-separator"></i>
      <span class="breadcrumb-current">Catalog</span>
    </nav>

    <div class="header-main">
      <div>
        <h1 class="page-title">Experiences in Paris</h1>
        <p class="experiences-count">{{ experiencesCount }} experiences found</p>
      </div>
      <button class="mobile-filter-btn" (click)="filterDrawerOpen = !filterDrawerOpen; filterDrawerToggled.emit(filterDrawerOpen)">
        <i class="fas fa-sliders-h"></i>
        Filters
      </button>
    </div>

    <div class="category-filters">
      <button
        *ngFor="let category of categories"
        class="category-btn"
        [class.active]="category.active"
        (click)="toggleCategory(category)">
        {{ category.name }}
      </button>
    </div>

    <div class="active-filters" *ngIf="hasActiveFilters">
      <div class="filter-chip" *ngFor="let label of activeFilterLabels">
        <span>{{ label }}</span>
      </div>
      <button class="clear-all-btn" (click)="onClearAll()">Clear all</button>
    </div>
  </div>
</div>
