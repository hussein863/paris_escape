<div class="availability-pricing-wrapper">
  <!-- Social Links -->
  <div class="section-card">
    <h2 class="section-title">Social Links</h2>

    <div class="form-group">
      <label for="instagram">Instagram</label>
      <div class="social-input-wrapper">
        <input id="instagram" type="text" class="form-control" placeholder="@username" [(ngModel)]="instagram" />
        <div class="form-checkbox-inline">
          <input type="checkbox" id="show-instagram" [(ngModel)]="showInstagram" />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="tiktok">TikTok</label>
      <div class="social-input-wrapper">
        <input id="tiktok" type="text" class="form-control" placeholder="@username" [(ngModel)]="tiktok" />
        <div class="form-checkbox-inline">
          <input type="checkbox" id="show-tiktok" [(ngModel)]="showTiktok" />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="youtube">YouTube</label>
      <div class="social-input-wrapper">
        <input id="youtube" type="text" class="form-control" placeholder="Channel URL" [(ngModel)]="youtube" />
        <div class="form-checkbox-inline">
          <input type="checkbox" id="show-youtube" [(ngModel)]="showYoutube" />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="website">Website</label>
      <div class="social-input-wrapper">
        <input id="website" type="text" class="form-control" placeholder="https://yourwebsite.com" [(ngModel)]="website" />
        <div class="form-checkbox-inline">
          <input type="checkbox" id="show-website" [(ngModel)]="showWebsite" />
        </div>
      </div>
    </div>

    <p class="form-hint">
      <i class="fas fa-info-circle"></i>
      Check to show on public profile
    </p>
  </div>

  <!-- Availability Defaults -->
  <div class="section-card">
    <div class="section-header">
      <h2 class="section-title">Availability Defaults</h2>
    </div>

    <div class="form-group">
      <label>Working Days</label>
      <div class="days-selector">
        <button
          type="button"
          class="day-btn"
          *ngFor="let day of dayKeys"
          [class.active]="workingDays[day]"
          (click)="toggleDay(day)"
        >
          {{ dayLabels[day] }}
        </button>
      </div>
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label for="startTime">Start Time</label>
        <input type="time" id="startTime" class="form-control" [(ngModel)]="startTime" />
      </div>
      <div class="form-group">
        <label for="endTime">End Time</label>
        <input type="time" id="endTime" class="form-control" [(ngModel)]="endTime" />
      </div>
    </div>

    <div class="form-group">
      <label for="timezone">Time Zone</label>
      <select id="timezone" class="form-control form-select" [(ngModel)]="timezone">
        <option *ngFor="let tz of timezones" [value]="tz">{{ tz }}</option>
      </select>
    </div>
  </div>

  <!-- Pricing Defaults -->
  <div class="section-card">
    <h2 class="section-title">Pricing Defaults</h2>

    <div class="form-group">
      <label for="baseRate">Base Rate (per person)</label>
      <div class="input-with-currency">
        <input type="number" id="baseRate" class="form-control" [(ngModel)]="baseRate" min="0" />
        <select class="form-control form-select currency-select" [(ngModel)]="defaultCurrency">
          <option *ngFor="let curr of currencies" [value]="curr">{{ curr }}</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="privateRate">Private Rate</label>
      <input type="number" id="privateRate" class="form-control" [(ngModel)]="privateRate" min="0" />
    </div>

    <div class="form-grid-2">
      <div class="form-group">
        <label for="minGroupSize">Min Group Size</label>
        <input type="number" id="minGroupSize" class="form-control" [(ngModel)]="minGroupSize" min="1" />
      </div>
      <div class="form-group">
        <label for="maxGroupSize">Max Group Size</label>
        <input type="number" id="maxGroupSize" class="form-control" [(ngModel)]="maxGroupSize" min="1" />
      </div>
    </div>

    <div class="form-group">
      <label for="childPricing">Child Pricing</label>
      <select id="childPricing" class="form-control form-select" [(ngModel)]="childPricing">
        <option *ngFor="let option of childPricingOptions" [value]="option">{{ option }}</option>
      </select>
    </div>
  </div>

  <!-- Inclusions Defaults -->
  <div class="section-card">
    <h2 class="section-title">Inclusions Defaults</h2>

    <div class="inclusions-grid">
      <div class="form-group">
        <label>What's Included</label>
        <div class="inclusions-list">
          <div class="inclusion-item" *ngFor="let item of whatsIncluded; let i = index">
            <input type="text" class="form-control" [(ngModel)]="item.text" placeholder="e.g., Expert guide" />
            <button class="btn-icon btn-remove" type="button" (click)="removeIncluded(i)">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        <button class="btn-add" type="button" (click)="addIncluded()">
          <i class="fas fa-plus"></i> Add Item
        </button>
      </div>

      <div class="form-group">
        <label>Not Included</label>
        <div class="inclusions-list">
          <div class="inclusion-item" *ngFor="let item of notIncluded; let i = index">
            <input type="text" class="form-control" [(ngModel)]="item.text" placeholder="e.g., Food &amp; drinks" />
            <button class="btn-icon btn-remove" type="button" (click)="removeNotIncluded(i)">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        <button class="btn-add" type="button" (click)="addNotIncluded()">
          <i class="fas fa-plus"></i> Add Item
        </button>
      </div>

      <div class="form-group">
        <label>Optional Add-ons</label>
        <div class="inclusions-list">
          <div class="addon-item" *ngFor="let addon of optionalAddons; let i = index">
            <input type="text" class="form-control" [(ngModel)]="addon.text" placeholder="e.g., Photographer" />
            <input type="number" class="form-control addon-price" [(ngModel)]="addon.price" placeholder="Price" min="0" />
            <button class="btn-icon btn-remove" type="button" (click)="removeAddon(i)">
              <i class="fas fa-times"></i>
            </button>
          </div>
        </div>
        <button class="btn-add" type="button" (click)="addAddon()">
          <i class="fas fa-plus"></i> Add Add-on
        </button>
      </div>
    </div>
  </div>

  <!-- Save -->
  <div class="save-row">
    <span class="save-success" *ngIf="saveSuccess">Saved!</span>
    <span class="save-error" *ngIf="saveError">{{ saveError }}</span>
    <button class="btn btn-primary" type="button" (click)="save()" [disabled]="saving">
      {{ saving ? 'Saving…' : 'Save Changes' }}
    </button>
  </div>
</div>
