<app-admin-header></app-admin-header>

<div class="app-shell" [class.sidebar-open]="isSidebarOpen">
  <button type="button" class="hamburger" (click)="toggleSidebar()" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <app-sidebar class="sidebar" [class.open]="isSidebarOpen"></app-sidebar>
  <div class="backdrop" *ngIf="isSidebarOpen" (click)="closeSidebar()"></div>

  <main class="app-main">
    <div class="analytics-page">
      <div class="coming-soon-card">
        <div class="cs-icon">
          <i class="fas fa-chart-line"></i>
        </div>
        <h1>Analytics</h1>
        <p class="cs-subtitle">Your performance dashboard is on its way.</p>
        <div class="cs-features">
          <div class="cs-feature">
            <i class="fas fa-eye"></i>
            <span>Profile & experience views</span>
          </div>
          <div class="cs-feature">
            <i class="fas fa-funnel-dollar"></i>
            <span>Booking conversion funnel</span>
          </div>
          <div class="cs-feature">
            <i class="fas fa-star"></i>
            <span>Review sentiment trends</span>
          </div>
          <div class="cs-feature">
            <i class="fas fa-euro-sign"></i>
            <span>Revenue breakdown & forecasts</span>
          </div>
          <div class="cs-feature">
            <i class="fas fa-map-marker-alt"></i>
            <span>Traveler origin map</span>
          </div>
          <div class="cs-feature">
            <i class="fas fa-clock"></i>
            <span>Peak booking times</span>
          </div>
        </div>
        <div class="cs-badge">
          <i class="fas fa-rocket"></i> Coming Soon
        </div>
      </div>
    </div>
  </main>
</div>
