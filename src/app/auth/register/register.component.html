<div class="register-page">
  <div class="register-card">
    <div class="register-logo">
      <img src="assets/images/logo.svg" alt="Paris Escape" class="logo-img" />
    </div>

    <h1 class="register-title">Create an account</h1>
    <p class="register-subtitle">Join us and explore Paris like never before</p>

    <div *ngIf="error" class="error-banner">{{ error }}</div>

    <!-- Role selector -->
    <div class="role-selector">
      <button
        type="button"
        class="role-btn"
        [class.active]="role === 'Customer'"
        (click)="role = 'Customer'"
      >
        <span class="role-icon">
          <!-- Suitcase -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.75"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="8" width="16" height="13" rx="2"/>
            <path d="M16 8V6a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            <line x1="4" y1="14" x2="20" y2="14"/>
          </svg>
        </span>
        <span>I'm a Traveler</span>
      </button>
      <button
        type="button"
        class="role-btn"
        [class.active]="role === 'Guide'"
        (click)="role = 'Guide'"
      >
        <span class="role-icon">
          <!-- Folded map -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.75"
               stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
            <line x1="9" y1="3" x2="9" y2="18"/>
            <line x1="15" y1="6" x2="15" y2="21"/>
          </svg>
        </span>
        <span>I'm a Guide</span>
      </button>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label for="name">Full name</label>
        <input
          id="name"
          type="text"
          [(ngModel)]="name"
          name="name"
          placeholder="Jane Doe"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          />
        </div>
        <div class="form-group">
          <label for="password2">Confirm password</label>
          <input
            id="password2"
            type="password"
            [(ngModel)]="password2"
            name="password2"
            placeholder="••••••••"
            required
            autocomplete="new-password"
          />
        </div>
      </div>

      <button type="submit" class="btn-register" [disabled]="loading">
        {{ loading ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <p class="register-footer">
      Already have an account?
      <a routerLink="/auth/login">Sign in</a>
    </p>
  </div>
</div>
