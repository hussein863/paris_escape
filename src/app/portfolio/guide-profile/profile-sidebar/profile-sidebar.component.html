<div class="profile-sidebar">
  <!-- Contact Section -->
  <div class="sidebar-card contact-card">
    <h3>Contact {{ guide.name.split(' ')[0] }}</h3>

    <button class="btn btn-primary message-btn" (click)="messageGuide()" [disabled]="messageSending" type="button">
      <i class="fas fa-envelope"></i>
      {{ messageSending ? 'Opening messages...' : 'Message Guide' }}
    </button>

    <p class="response-time" *ngIf="guide.responseTime">
      Typical response: {{ guide.responseTime }}
    </p>
  </div>

  <!-- Trust & Safety Section -->
  <div class="sidebar-card trust-card">
    <h3>Trust & Safety</h3>

    <div class="trust-items">
      <div class="trust-item">
        <i class="fas fa-shield-alt"></i>
        <div class="trust-content">
          <span class="trust-title">Verified Guide</span>
          <span class="trust-desc">Identity and credentials verified</span>
        </div>
      </div>

      <div class="trust-item">
        <i class="fa-solid fa-certificate"></i>
        <div class="trust-content">
          <span class="trust-title">Licensed & Insured</span>
          <span class="trust-desc">Professional liability coverage</span>
        </div>
      </div>

      <div class="trust-item">
        <i class="fa-solid fa-rotate-left" style="color: black;"></i>
        <div class="trust-content">
          <span class="trust-title">Flexible Cancellation</span>
          <span class="trust-desc">Free cancellation up to {{ guide.cancellationWindow || '24 hours before' }}</span>
        </div>
      </div>
    </div>

    <button class="report-btn" (click)="reportClicked.emit()">
      <i class="fas fa-flag"></i>
      Report Profile
    </button>
  </div>
</div>

<app-auth-prompt-modal
  [visible]="showAuthModal"
  [action]="'message this guide'"
  (closed)="showAuthModal = false">
</app-auth-prompt-modal>
