<aside class="sidebar" [class.collapsed]="!isMenuOpen">
  <div class="sidebar-header">
    <div class="logo">
      <img src="assets/images/logo.svg" alt="Paris" class="logo-icon">
    </div>
    <button class="toggle-btn" (click)="toggleMenu()" aria-label="Toggle menu">
      <i [class]="isMenuOpen ? 'fas fa-chevron-left' : 'fas fa-chevron-right'"></i>
    </button>
  </div>

  <nav class="sidebar-nav">
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      class="nav-item">
      <i class="nav-icon fas fa-{{ item.icon }}"></i>
      <span class="nav-label" *ngIf="isMenuOpen">{{ item.label }}</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar">SA</div>
      <div class="user-details" *ngIf="isMenuOpen">
        <div class="user-name">Super Admin</div>
        <div class="user-role">Administrator</div>
      </div>
    </div>
  </div>
</aside>
