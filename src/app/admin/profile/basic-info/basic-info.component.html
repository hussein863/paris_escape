<div class="section-card">
  <h2 class="section-title">Basic Information</h2>

  <div class="form-group">
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" class="form-control" [(ngModel)]="firstName" />
  </div>

  <div class="form-group">
    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" class="form-control" [(ngModel)]="lastName" />
  </div>

  <div class="form-group">
    <label for="yearsOfExperience">Years of Experience</label>
    <input type="number" id="yearsOfExperience" class="form-control" [(ngModel)]="yearsOfExperience" min="0" />
  </div>

  <div class="form-group">
    <label>Languages</label>
    <div class="languages-list">
      <div class="language-item" *ngFor="let language of languages; let i = index">
        <input
          type="text"
          class="form-control"
          placeholder="Language"
          [(ngModel)]="language.name"
          (blur)="saveLanguage(language)"
        />
        <select class="form-control form-select" [(ngModel)]="language.level" (change)="saveLanguage(language)">
          <option *ngFor="let level of languageLevels" [value]="level">{{ level }}</option>
        </select>
        <button class="btn-icon btn-remove" type="button" (click)="removeLanguage(language, i)">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
    <button class="btn-add" type="button" (click)="addLanguage()">
      <i class="fas fa-plus"></i>
      Add Language
    </button>
  </div>

  <div class="form-group">
    <label>Specialties &amp; Themes</label>
    <div class="specialties-chips">
      <span class="chip" *ngFor="let specialty of specialties; let i = index">
        {{ specialty.name }}
        <button class="chip-remove" type="button" (click)="removeSpecialty(specialty, i)"></button>
      </span>
    </div>
    <div *ngIf="showSpecialtyInput" class="specialty-input-row">
      <input
        type="text"
        class="form-control"
        placeholder="Specialty name"
        [(ngModel)]="newSpecialtyName"
        (keyup.enter)="confirmAddSpecialty()"
      />
      <button class="btn-add" type="button" (click)="confirmAddSpecialty()">Add</button>
    </div>
    <button class="btn-add" type="button" (click)="showAddSpecialty()" *ngIf="!showSpecialtyInput">
      <i class="fas fa-plus"></i>
      Add Specialty
    </button>
  </div>

  <div class="form-group">
    <label for="bio">Bio</label>
    <textarea
      id="bio"
      class="form-control form-textarea"
      rows="6"
      [(ngModel)]="bio"
      [maxlength]="bioMaxLength"
      placeholder="Born and raised in Paris, I've spent the last 8 years sharing my love for this beautiful city..."
    ></textarea>
    <div class="character-count">{{ bioCharacterCount }}/{{ bioMaxLength }} characters</div>
  </div>

  <div class="save-row">
    <button class="btn btn-primary btn-save" type="button" (click)="save()" [disabled]="saving">
      <i class="fas" [class.fa-save]="!saving" [class.fa-spinner]="saving" [class.fa-spin]="saving"></i>
      {{ saving ? 'Saving…' : 'Save Changes' }}
    </button>
  </div>
</div>

<div class="toast-container" *ngIf="toast" [class]="'toast toast-' + toast.type">
  <i class="fas" [class.fa-check-circle]="toast.type === 'success'" [class.fa-times-circle]="toast.type === 'error'"></i>
  <span>{{ toast.message }}</span>
  <button type="button" class="toast-close" (click)="toast = null"><i class="fas fa-times"></i></button>
</div>
