<aside class="filters-sidebar">
  <div class="sidebar-header">
    <h3 class="sidebar-title">Filters</h3>
    <button class="reset-btn">Reset</button>
  </div>

  <div class="filter-section">
    <button class="filter-header" (click)="toggleSection('language')">
      <span>Language</span>
      <i class="fas" [class.fa-chevron-down]="!expandedSections.language" [class.fa-chevron-up]="expandedSections.language"></i>
    </button>
    <div class="filter-content" *ngIf="expandedSections.language">
      <label class="checkbox-label" *ngFor="let lang of languages">
        <input type="checkbox" [(ngModel)]="lang.checked" (ngModelChange)="onFilterChange()">
        <span>{{ lang.name }}</span>
      </label>
    </div>
  </div>

  <div class="filter-section">
    <button class="filter-header" (click)="toggleSection('price')">
      <span>Price</span>
      <i class="fas" [class.fa-chevron-down]="!expandedSections.price" [class.fa-chevron-up]="expandedSections.price"></i>
    </button>
    <div class="filter-content" *ngIf="expandedSections.price">
      <label class="checkbox-label" *ngFor="let price of priceRanges">
        <input type="checkbox" [(ngModel)]="price.checked" (ngModelChange)="onFilterChange()">
        <span>{{ price.label }}</span>
      </label>
    </div>
  </div>

  <div class="filter-section">
    <button class="filter-header" (click)="toggleSection('duration')">
      <span>Duration</span>
      <i class="fas" [class.fa-chevron-down]="!expandedSections.duration" [class.fa-chevron-up]="expandedSections.duration"></i>
    </button>
    <div class="filter-content" *ngIf="expandedSections.duration">
      <label class="checkbox-label" *ngFor="let duration of durations">
        <input type="checkbox" [(ngModel)]="duration.checked" (ngModelChange)="onFilterChange()">
        <span>{{ duration.label }}</span>
      </label>
    </div>
  </div>

  <div class="filter-section">
    <button class="filter-header" (click)="toggleSection('category')">
      <span>Category</span>
      <i class="fas" [class.fa-chevron-down]="!expandedSections.category" [class.fa-chevron-up]="expandedSections.category"></i>
    </button>
    <div class="filter-content" *ngIf="expandedSections.category">
      <label class="checkbox-label" *ngFor="let cat of categories">
        <input type="checkbox" [(ngModel)]="cat.checked" (ngModelChange)="onFilterChange()">
        <span>{{ cat.name }}</span>
      </label>
    </div>
  </div>

  <div class="filter-section">
    <button class="filter-header" (click)="toggleSection('neighborhood')">
      <span>Neighborhood</span>
      <i class="fas" [class.fa-chevron-down]="!expandedSections.neighborhood" [class.fa-chevron-up]="expandedSections.neighborhood"></i>
    </button>
    <div class="filter-content" *ngIf="expandedSections.neighborhood">
      <label class="checkbox-label" *ngFor="let area of neighborhoods">
        <input type="checkbox" [(ngModel)]="area.checked" (ngModelChange)="onFilterChange()">
        <span>{{ area.name }}</span>
      </label>
    </div>
  </div>

  <div class="filter-section">
    <label class="checkbox-label">
      <input type="checkbox" [(ngModel)]="availableToday" (ngModelChange)="onFilterChange()">
      <span>Available today</span>
    </label>
  </div>
</aside>
