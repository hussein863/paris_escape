<header class="header">
  <div class="header-container">
    <a routerLink="/landing" class="logo">
      <span class="logo-text">Paris</span>
      <span class="logo-text-light">Escape</span>
    </a>

    <nav class="nav" [class.nav-open]="isMenuOpen">
      <ul class="nav-list">
        <li *ngFor="let item of navItems" class="nav-item">
          <a [routerLink]="item.route" class="nav-link" (click)="closeMenu()">
            {{ item.label }}
          </a>
        </li>
        <!-- Mobile-only auth links -->
        <li class="nav-item" *ngIf="!auth.isLoggedIn()">
          <a routerLink="/auth/login" class="nav-link" (click)="closeMenu()">Sign in</a>
        </li>
        <li class="nav-item" *ngIf="!auth.isLoggedIn()">
          <a routerLink="/auth/register" class="nav-link nav-link--cta" (click)="closeMenu()">Sign up</a>
        </li>
        <li class="nav-item" *ngIf="auth.isLoggedIn()">
          <a (click)="goToDashboard(); closeMenu()" class="nav-link" style="cursor:pointer">My Account</a>
        </li>
      </ul>
    </nav>

    <div class="header-actions">
      <!-- Not logged in -->
      <ng-container *ngIf="!auth.isLoggedIn()">
        <a routerLink="/auth/login" class="btn-text">Sign in</a>
        <a routerLink="/auth/register" class="btn-primary">Sign up</a>
      </ng-container>

      <!-- Logged in -->
      <div class="user-menu" *ngIf="auth.isLoggedIn()" (click)="toggleDropdown()">
        <div class="avatar-wrapper">
          <img *ngIf="userAvatar" [src]="userAvatar" [alt]="userName" class="user-avatar">
          <div *ngIf="!userAvatar" class="user-initials">{{ initials }}</div>
        </div>
        <div class="user-info">
          <span class="user-name">{{ userName }}</span>
          <span class="user-role">{{ userRole }}</span>
        </div>
        <i class="fas fa-chevron-down dropdown-arrow" [class.open]="dropdownOpen"></i>

        <div class="profile-dropdown" *ngIf="dropdownOpen" (click)="$event.stopPropagation()">
          <div class="dropdown-header">
            <img *ngIf="userAvatar" [src]="userAvatar" [alt]="userName" class="user-avatar small">
            <div *ngIf="!userAvatar" class="user-initials small">{{ initials }}</div>
            <div>
              <div class="dropdown-name">{{ userName }}</div>
              <div class="dropdown-role">{{ userRole }}</div>
            </div>
          </div>
          <hr class="dropdown-divider">
          <button class="dropdown-item" (click)="goToDashboard()">
            <i class="fas fa-gauge-high"></i> Dashboard
          </button>
          <button class="dropdown-item" [routerLink]="'/client/reservations'">
            <i class="fas fa-calendar-check"></i> My Reservations
          </button>
          <button class="dropdown-item" [routerLink]="'/client/messages'">
            <i class="fas fa-message"></i> Messages
          </button>
          <button class="dropdown-item" [routerLink]="isGuide ? '/admin/profile' : '/client/settings'">
            <i class="fas fa-gear"></i> Settings
          </button>
          <hr class="dropdown-divider">
          <button class="dropdown-item logout" (click)="logout()">
            <i class="fas fa-right-from-bracket"></i> Log out
          </button>
        </div>
      </div>

      <button class="btn-mobile-menu" (click)="toggleMenu()" aria-label="Toggle menu">
        <span class="menu-icon" [class.menu-icon-open]="isMenuOpen">
          <span></span><span></span><span></span>
        </span>
      </button>
    </div>
  </div>
</header>
