<div class="guide-profile-page">
  <app-header></app-header>

  <!-- Loading -->
  <div class="page-loading" *ngIf="loading" style="padding:4rem;text-align:center;color:#6b7280;">
    <i class="fas fa-spinner fa-spin" style="font-size:2rem;"></i>
    <p style="margin-top:1rem;">Loading guide profile...</p>
  </div>

  <!-- Error -->
  <div class="page-error" *ngIf="error && !loading" style="padding:4rem;text-align:center;color:#dc2626;">
    <i class="fas fa-exclamation-circle" style="font-size:2rem;"></i>
    <p style="margin-top:1rem;">{{ error }}</p>
  </div>

  <!-- Content -->
  <ng-container *ngIf="!loading && !error">
    <app-profile-header [guide]="guide"></app-profile-header>

    <div class="profile-content">
      <div class="main-content">
        <app-profile-about [guide]="guide"></app-profile-about>
        <app-profile-location [guide]="guide"></app-profile-location>
        <app-profile-experiences [experiences]="experiences" [guideName]="guide.name"></app-profile-experiences>
        <app-profile-reviews
          [reviews]="reviews"
          [stats]="reviewStats"
          [canReview]="canReviewGuide"
          [isLoggedIn]="authService.isLoggedIn()"
          (writeReviewClicked)="onWriteReviewClicked()"
          (reportClicked)="onReportGuideClicked()">
        </app-profile-reviews>
      </div>

      <aside class="sidebar">
        <app-profile-sidebar [guide]="guide" [guideId]="guide.id" (reportClicked)="onReportGuideClicked()"></app-profile-sidebar>
      </aside>
    </div>

    <app-profile-similar-guides [guides]="similarGuides"></app-profile-similar-guides>
  </ng-container>

  <app-footer></app-footer>
</div>

<app-auth-prompt-modal
  [visible]="showAuthModal"
  [action]="authModalAction"
  (closed)="showAuthModal = false">
</app-auth-prompt-modal>

<!-- Write Review Modal -->
<div class="gp-backdrop" [style.display]="showReviewModal ? 'flex' : 'none'" (click)="showReviewModal = false">
  <div class="gp-modal" (click)="$event.stopPropagation()" role="dialog">
    <div class="gp-modal-header">
      <h3>Write a Review</h3>
      <button class="gp-modal-close" (click)="showReviewModal = false"><i class="fas fa-times"></i></button>
    </div>
    <p class="gp-modal-subtitle">{{ guide?.name }}</p>

    <div class="gp-star-picker">
      <button *ngFor="let s of [1,2,3,4,5]" type="button" class="gp-star-btn"
        [class.filled]="s <= reviewRating" (click)="reviewRating = s">
        <i class="fas fa-star"></i>
      </button>
    </div>

    <textarea class="gp-textarea" placeholder="Share your experience with this guide…" [(ngModel)]="reviewContent" rows="4"></textarea>

    <div class="gp-error" *ngIf="reviewError">{{ reviewError }}</div>

    <button class="gp-submit-btn" (click)="submitReview()"
      [disabled]="reviewSubmitting || reviewRating === 0 || !reviewContent.trim()">
      {{ reviewSubmitting ? 'Submitting…' : 'Submit Review' }}
    </button>
  </div>
</div>

<!-- Report Guide Modal -->
<div class="gp-backdrop" [style.display]="showReportModal ? 'flex' : 'none'" (click)="showReportModal = false">
  <div class="gp-modal" (click)="$event.stopPropagation()" role="dialog">
    <div class="gp-modal-header">
      <h3>Report this Guide</h3>
      <button class="gp-modal-close" (click)="showReportModal = false"><i class="fas fa-times"></i></button>
    </div>

    <ng-container *ngIf="!reportSuccess">
      <div class="gp-field">
        <label>Reason</label>
        <select [(ngModel)]="reportReason" class="gp-select">
          <option value="">Select a reason</option>
          <option value="misleading">Misleading information</option>
          <option value="inappropriate">Inappropriate content</option>
          <option value="scam">Scam or fraud</option>
          <option value="safety">Safety concern</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="gp-field">
        <label>Description</label>
        <textarea class="gp-textarea" placeholder="Please provide details…" [(ngModel)]="reportDescription" rows="4"></textarea>
      </div>
      <div class="gp-error" *ngIf="reportError">{{ reportError }}</div>
      <button class="gp-submit-btn" (click)="submitReport()"
        [disabled]="reportSubmitting || !reportReason || !reportDescription.trim()">
        {{ reportSubmitting ? 'Submitting…' : 'Submit Report' }}
      </button>
    </ng-container>

    <div class="gp-success" *ngIf="reportSuccess">
      <i class="fas fa-check-circle"></i>
      <p>Thank you. Your report has been submitted and our team will review it.</p>
      <button class="gp-submit-btn" (click)="showReportModal = false">Close</button>
    </div>
  </div>
</div>
