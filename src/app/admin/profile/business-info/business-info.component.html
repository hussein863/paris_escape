<div class="section-card">
  <h2 class="section-title">Business Info</h2>

  <div class="form-group">
    <label for="companyName">Company Name (Optional)</label>
    <input type="text" id="companyName" class="form-control" placeholder="Your company" [(ngModel)]="companyName" />
  </div>

  <div class="form-group">
    <label for="siret">SIRET</label>
    <input type="text" id="siret" class="form-control" placeholder="123 456 789 00012" [(ngModel)]="siret" />
  </div>

  <div class="form-group">
    <label for="vatNumber">VAT Number</label>
    <input type="text" id="vatNumber" class="form-control" [(ngModel)]="vatNumber" />
  </div>

  <div class="form-group">
    <label for="publicEmail">Public Contact Email</label>
    <input type="email" id="publicEmail" class="form-control" [(ngModel)]="publicEmail" />
    <div class="form-checkbox">
      <input type="checkbox" id="showEmail" [(ngModel)]="showEmailOnProfile" />
      <label for="showEmail" style="color: rgba(75, 85, 99, 1);">Show on public profile</label>
    </div>
  </div>

  <div class="form-group">
    <label for="publicPhone">Public Phone</label>
    <input type="tel" id="publicPhone" class="form-control" [(ngModel)]="publicPhone" />
    <div class="form-checkbox">
      <input type="checkbox" id="showPhone" [(ngModel)]="showPhoneOnProfile" />
      <label for="showPhone" style="color: rgba(75, 85, 99, 1);">Show on public profile</label>
    </div>
  </div>

  <div class="save-row">
    <button class="btn btn-primary" type="button" (click)="save()" [disabled]="saving">
      <i class="fas" [class.fa-save]="!saving" [class.fa-spinner]="saving" [class.fa-spin]="saving"></i>
      {{ saving ? 'Saving…' : 'Save Changes' }}
    </button>
  </div>
</div>

<div class="toast-container" *ngIf="toast" [class]="'toast toast-' + toast.type">
  <i class="fas" [class.fa-check-circle]="toast.type === 'success'" [class.fa-times-circle]="toast.type === 'error'"></i>
  <span>{{ toast.message }}</span>
  <button type="button" class="toast-close" (click)="toast = null"><i class="fas fa-times"></i></button>
</div>
